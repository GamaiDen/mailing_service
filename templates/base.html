<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Сервис рассылок{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark"><div class="container">
<a class="navbar-brand" href="{% url 'home' %}">📧 Рассылки</a>
<a class="nav-link text-white" href="{% url 'mailing_list' %}">Рассылки</a>
<a class="nav-link text-white" href="{% url 'client_list' %}">Клиенты</a>
<a class="nav-link text-white" href="{% url 'message_list' %}">Сообщения</a>
<div class="ms-auto d-flex">
{% if user.is_authenticated %}
<span class="text-white me-3">👤 {{ user.username }}</span>
<a class="nav-link text-white" href="{% url 'logout' %}">Выйти</a>
{% else %}
<a class="nav-link text-white" href="{% url 'login' %}">Войти</a>
<a class="nav-link text-white" href="{% url 'register' %}">Регистрация</a>
{% endif %}
</div>
</div></nav>
<div class="container mt-4">
{% if messages %}{% for message in messages %}<div class="alert alert-info">{{ message }}</div>{% endfor %}{% endif %}
{% block content %}{% endblock %}
</div>
</body>
</html>
