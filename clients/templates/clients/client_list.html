{% extends 'base.html' %}
{% block title %}Клиенты{% endblock %}
{% block content %}
<h1>Клиенты</h1>
<a href="{% url 'client_create' %}" class="btn btn-primary mb-3">+ Добавить клиента</a>
<table class="table">
<thead><tr><th>Email</th><th>Ф.И.О.</th><th>Действия</th></tr></thead>
<tbody>
{% for client in clients %}
<tr><td>{{ client.email }}</td><td>{{ client.full_name }}</td>
<td>
<a href="{% url 'client_update' client.pk %}" class="btn btn-sm btn-warning">✏️</a>
<a href="{% url 'client_delete' client.pk %}" class="btn btn-sm btn-danger">🗑️</a>
</td></tr>
{% empty %}<tr><td colspan="3">Нет клиентов</td></tr>{% endfor %}
</tbody></table>
{% endblock %}
