{% extends 'base.html' %}
{% block title %}Сообщения{% endblock %}
{% block content %}
<h1>Сообщения</h1>
<a href="{% url 'message_create' %}" class="btn btn-primary mb-3">+ Создать сообщение</a>
<table class="table"><thead><tr><th>Тема</th><th>Действия</th></tr></thead>
<tbody>
{% for message in messages %}
<tr><td>{{ message.subject }}</td>
<td>
<a href="{% url 'message_update' message.pk %}" class="btn btn-sm btn-warning">✏️</a>
<a href="{% url 'message_delete' message.pk %}" class="btn btn-sm btn-danger">🗑️</a>
</td></tr>
{% empty %}<tr><td colspan="2">Нет сообщений</td></tr>{% endfor %}
</tbody></table>
{% endblock %}
